<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="./style.css" />
    
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="main-title">Job Application Tracker</div>
    </div>
    <!-- Dashboard -->
    <div class="dashboard">
      <div class="dash-card">
        <p class="dash-label">Total</p>
        <h2 class="dash-number total-num" id="total-count">8</h2>
      </div>
      <div class="dash-card">
        <p class="dash-label">Interview</p>
        <h2 class="dash-number interview-num" id="interview-count">0</h2>
      </div>
      <div class="dash-card">
        <p class="dash-label">Rejected</p>
        <h2 class="dash-number rejected-num" id="rejected-count">0</h2>
      </div>
    </div>
     <hr class="divider">

     <!-- Available Jobs Section -->
        <div class="jobs-section">

            <div class="jobs-header">
                <h2 class="jobs-title">Available Jobs</h2>
                <span class="jobs-count-label" id="jobs-count-label">8 jobs</span>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" id="tab-btn-all" onclick="showTab('all')">All</button>
                <button class="tab-btn" id="tab-btn-interview" onclick="showTab('interview')">Interview</button>
                <button class="tab-btn" id="tab-btn-rejected" onclick="showTab('rejected')">Rejected</button>
            </div>

            <!-- All Tab Content -->
            <div id="tab-all" class="tab-content active">
                <div id="all-jobs-list"></div>
                <div id="all-empty" class="empty-state" style="display:none;">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991106.png" alt="empty" class="empty-img">
                    <h3 class="empty-title">No jobs available</h3>
                    <p class="empty-subtitle">Check back soon for new job opportunities</p>
                </div>
            </div>

            <!-- Interview Tab Content -->
            <div id="tab-interview" class="tab-content">
                <div id="interview-jobs-list"></div>
                <div id="interview-empty" class="empty-state">
                    <img src="./assets/jobs.png" alt="empty" class="empty-img">
                    <h3 class="empty-title">No jobs available</h3>
                    <p class="empty-subtitle">Check back soon for new job opportunities</p>
                </div>
            </div>

            <!-- Rejected Tab Content -->
            <div id="tab-rejected" class="tab-content">
                <div id="rejected-jobs-list"></div>
                <div id="rejected-empty" class="empty-state">
                    <img src="./assets/jobs.png" alt="empty" class="empty-img">
                    <h3 class="empty-title">No jobs available</h3>
                    <p class="empty-subtitle">Check back soon for new job opportunities</p>
                </div>
            </div>

        </div>
    <script src="./script.js"></script>
  </body>
</html>
