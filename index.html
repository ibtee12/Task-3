<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="main-title">Job Application Tracker</div>
    </div>
    <!-- Dashboard -->
    <div class="dashboard">
      <div class="dash-card">
        <p class="dash-label">Total</p>
        <h2 class="dash-number total-num" id="total-count">8</h2>
      </div>
      <div class="dash-card">
        <p class="dash-label">Interview</p>
        <h2 class="dash-number interview-num" id="interview-count">0</h2>
      </div>
      <div class="dash-card">
        <p class="dash-label">Rejected</p>
        <h2 class="dash-number rejected-num" id="rejected-count">0</h2>
      </div>
    </div>
  </body>
</html>
